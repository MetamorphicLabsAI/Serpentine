<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serpentine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="arcade-machine">
        <div class="game-container">
            <div class="header">
                <div class="score-board">
                    <div class="score-label">SCORE</div>
                    <div id="score" class="score-value">0</div>
                </div>
                <div class="title">SERPENTINE</div>
                <div class="score-board">
                    <div class="score-label">BEST</div>
                    <div id="high-score" class="score-value">0</div>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="600" height="600"></canvas>
                <div id="game-over" class="overlay hidden">
                    <h2>SYSTEM FAILURE</h2>
                    <p>FINAL SCORE: <span id="final-score" class="highlight">0</span></p>
                    <button id="restart-btn">REBOOT SYSTEM</button>
                    <button id="menu-btn" style="margin-top: 15px; font-size: 1rem; padding: 10px 30px; background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.3); color: #fff; box-shadow: none;">MAIN MENU</button>
                </div>
                <div id="start-screen" class="overlay">
                    <h2 style="font-size: 2.2rem; margin-bottom: 5px;">CHOOSE PROGRAM</h2>
                    
                    <div class="character-select">
                        <button id="prev-btn" class="nav-btn">◀</button>
                        
                        <div class="character-info">
                            <h3 id="char-name">NEON PROTOCOL</h3>
                            <p id="char-lore">The original OS baseline. Reliable, bright, and fiercely fast.</p>
                        </div>
                        
                        <button id="next-btn" class="nav-btn">▶</button>
                    </div>
                    
                    <p class="blink" style="margin-bottom: 10px; font-size: 0.9rem;">PRESS ARROW KEYS OR SWIPE TO START</p>
                    <button id="start-btn">INITIALIZE</button>
                </div>
            </div>

            <div class="controls-hint">
                <span>&uarr;</span>
                <span>&larr;</span>
                <span>&darr;</span>
                <span>&rarr;</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
